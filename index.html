<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Legible">
<meta name="theme-color" content="#1a1714">
<link rel="manifest" href="manifest.json">
<title>Legible</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tokens ── */
:root {
  --ink:       #1a1714;
  --ink2:      #3d3830;
  --muted:     #8a8070;
  --rule:      #2e2b27;
  --surface:   #211e1b;
  --lift:      #2a2520;
  --gold:      #c9a84c;
  --gold-dim:  #7a6530;
  --paper:     #f5f0e8;

  --ff-serif: 'Lora', Georgia, serif;
  --ff-sans:  'DM Sans', system-ui, sans-serif;

  --safe-t: env(safe-area-inset-top,    0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-l: env(safe-area-inset-left,   0px);
  --safe-r: env(safe-area-inset-right,  0px);
}

/* ── Base ── */
html {
  background: var(--ink);
  color: var(--paper);
  font-family: var(--ff-sans);
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

body {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  background:
    radial-gradient(ellipse 140% 60% at 50% -10%,
      rgba(201,168,76,0.04) 0%, transparent 55%),
    var(--ink);
}

/* ── Grain overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 999;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px 256px;
}

/* ── Screens ── */
.screen { display: none; }
.screen.active { display: flex; flex-direction: column; min-height: 100dvh; }

/* ══════════════════════════════
   INPUT SCREEN
══════════════════════════════ */
#input-screen {
  padding:
    calc(var(--safe-t) + 32px)
    calc(var(--safe-r) + 24px)
    calc(var(--safe-b) + 32px)
    calc(var(--safe-l) + 24px);
  gap: 20px;
  max-width: 520px;
  margin: 0 auto;
  width: 100%;
}

.wordmark {
  font-family: var(--ff-serif);
  font-size: 15px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 4px;
}

.tagline {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.04em;
}

/* Tab bar */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--rule);
  gap: 0;
}
.tab {
  flex: 1;
  padding: 11px 0;
  font-family: var(--ff-sans);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--muted);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

.tab-panel { display: none; flex-direction: column; gap: 8px; }
.tab-panel.active { display: flex; }

.field-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
}

input[type=url], textarea {
  width: 100%;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 10px;
  color: var(--paper);
  font-family: var(--ff-sans);
  font-size: 16px;
  line-height: 1.5;
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.15s;
  resize: none;
}
input[type=url]:focus, textarea:focus {
  border-color: var(--gold-dim);
}
input::placeholder, textarea::placeholder { color: var(--muted); }
textarea { min-height: 130px; }

/* CTA */
#listen-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 17px;
  background: var(--gold);
  color: var(--ink);
  border: none;
  border-radius: 12px;
  font-family: var(--ff-sans);
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.04em;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: opacity 0.15s, transform 0.1s;
}
#listen-btn:active { transform: scale(0.98); opacity: 0.85; }
#listen-btn:disabled { opacity: 0.3; pointer-events: none; }
#listen-btn .spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.2);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Error */
.error-box {
  display: none;
  padding: 12px 14px;
  background: rgba(200, 60, 60, 0.1);
  border: 1px solid rgba(200, 60, 60, 0.3);
  border-radius: 10px;
  font-size: 13px;
  color: #e07070;
  line-height: 1.5;
}
.error-box.visible { display: block; }

/* Info strip */
.info-strip {
  display: flex;
  flex-direction: column;
  gap: 7px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 10px;
}
.info-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}
.info-row .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold-dim);
  flex-shrink: 0;
  margin-top: 5px;
}

/* ══════════════════════════════
   PLAYER SCREEN
══════════════════════════════ */
#player-screen {
  flex-direction: column;
  min-height: 100dvh;
}

/* Top bar */
#player-topbar {
  display: flex;
  align-items: center;
  padding:
    calc(var(--safe-t) + 12px)
    calc(var(--safe-r) + 20px)
    12px
    calc(var(--safe-l) + 20px);
  gap: 12px;
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
  background: rgba(26, 23, 20, 0.9);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  position: sticky;
  top: 0;
  z-index: 40;
}

#back-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--ff-sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--gold);
  background: none;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  padding: 4px 0;
  flex-shrink: 0;
}
#back-btn svg { width: 16px; height: 16px; }

#player-title {
  flex: 1;
  font-family: var(--ff-serif);
  font-size: 14px;
  color: var(--paper);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: 0.75;
}

#gen-badge {
  display: none;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--muted);
  flex-shrink: 0;
}
#gen-badge.visible { display: flex; }
#gen-badge .pulse {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  animation: pulse 1.1s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

/* Scroll area */
#transcript-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 24px 24px 220px;
  max-width: 640px;
  margin: 0 auto;
  width: 100%;
}

/* Article header */
#article-source {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 10px;
}
#article-heading {
  font-family: var(--ff-serif);
  font-size: clamp(22px, 5vw, 28px);
  font-weight: 600;
  line-height: 1.25;
  color: var(--paper);
  margin-bottom: 12px;
}
#article-meta {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--muted);
  padding-bottom: 20px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 24px;
}

/* Transcript body */
#transcript {
  font-family: var(--ff-serif);
  font-size: 19px;
  line-height: 1.9;
  color: var(--muted);
  position: relative;
}

/* Word tokens */
.w {
  display: inline;
  cursor: pointer;
  border-radius: 3px;
  padding: 1px 1px;
  transition: color 0.07s, background 0.07s, transform 0.07s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  position: relative;
}

/* Spoken — dimmed */
.w.past { color: rgba(245,240,232,0.22); }

/* Currently speaking — gold lift */
.w.now {
  color: var(--ink);
  background: var(--gold);
  border-radius: 4px;
  padding: 1px 4px;
  margin: 0 -2px;
  transform: translateY(-1px);
  box-shadow: 0 2px 8px rgba(201,168,76,0.35);
}

/* Upcoming — normal text */
.w.coming { color: rgba(245,240,232,0.82); }

.para-gap { display: block; height: 1.2em; }

/* ══════════════════════════════
   PLAYER CONTROLS (fixed)
══════════════════════════════ */
#player-controls {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  z-index: 50;
  background: rgba(22, 19, 16, 0.97);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--rule);
  padding:
    14px
    calc(var(--safe-r) + 20px)
    calc(var(--safe-b) + 14px)
    calc(var(--safe-l) + 20px);
  display: none;
  flex-direction: column;
  gap: 0;
  max-width: 640px;
  margin: 0 auto;
}
#player-controls.visible { display: flex; }

/* Progress */
.progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.time-label {
  font-size: 11px;
  font-weight: 500;
  font-variant-numeric: tabular-nums;
  color: var(--muted);
  width: 36px;
  flex-shrink: 0;
}
.time-label:last-child { text-align: right; }

#scrubber-wrap {
  flex: 1;
  height: 24px;
  display: flex;
  align-items: center;
  cursor: pointer;
  position: relative;
}
#scrubber-track {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: var(--rule);
  border-radius: 1px;
}
#scrubber-fill {
  position: absolute;
  left: 0;
  height: 2px;
  background: var(--gold);
  border-radius: 1px;
  width: 0%;
  transition: width 0.1s linear;
}
#scrubber-thumb {
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--gold);
  top: 50%; transform: translate(-50%, -50%);
  left: 0%;
  box-shadow: 0 0 0 3px rgba(201,168,76,0.2);
  transition: left 0.1s linear;
}

/* Controls row */
.controls-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.ctrl {
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: var(--paper);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  border-radius: 50%;
  width: 44px; height: 44px;
  transition: background 0.1s;
}
.ctrl:active { background: rgba(255,255,255,0.07); }
.ctrl svg { width: 26px; height: 26px; display: block; }

#play-pause-btn {
  width: 62px; height: 62px;
  border-radius: 50%;
  border: none;
  background: var(--gold);
  color: var(--ink);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  transition: transform 0.1s, opacity 0.1s;
  flex-shrink: 0;
}
#play-pause-btn:active { transform: scale(0.94); opacity: 0.85; }
#play-pause-btn svg { width: 24px; height: 24px; display: block; }

#speed-btn {
  font-family: var(--ff-sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: 20px;
  padding: 6px 13px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  min-width: 52px;
  text-align: center;
}

/* ══════════════════════════════
   TOAST
══════════════════════════════ */
#toast {
  position: fixed;
  bottom: calc(var(--safe-b) + 110px);
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface);
  border: 1px solid var(--rule);
  color: var(--paper);
  font-size: 13px;
  padding: 9px 16px;
  border-radius: 20px;
  white-space: nowrap;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s, transform 0.18s;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══════════════════════════════
   RESPONSIVE
══════════════════════════════ */
@media (min-width: 600px) {
  #player-controls {
    left: 50%; right: auto;
    width: min(640px, 100%);
    transform: translateX(-50%);
    border-radius: 16px 16px 0 0;
  }
}
</style>
</head>
<body>

<!-- ══ INPUT SCREEN ══ -->
<div class="screen active" id="input-screen">
  <div class="wordmark">Legible</div>
  <div class="tagline">Listen to any article · on-device · no account</div>

  <div class="tabs" role="tablist">
    <button class="tab active" id="tab-url-btn" onclick="switchTab('url')" role="tab">URL</button>
    <button class="tab"        id="tab-paste-btn" onclick="switchTab('paste')" role="tab">Paste text</button>
  </div>

  <div class="tab-panel active" id="tab-url">
    <div class="field-label">Article URL</div>
    <input type="url" id="url-input"
      placeholder="https://example.com/article"
      inputmode="url" autocorrect="off" autocapitalize="off" spellcheck="false"
      onkeydown="if(event.key==='Enter') startListening()">
  </div>

  <div class="tab-panel" id="tab-paste">
    <div class="field-label">Paste article text</div>
    <textarea id="paste-input" placeholder="Copy and paste any article here…" rows="6"></textarea>
  </div>

  <div class="error-box" id="error-box"></div>

  <button id="listen-btn" onclick="startListening()">
    <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18" id="btn-icon">
      <polygon points="6,4 16,10 6,16"/>
    </svg>
    <span id="btn-label">Listen</span>
  </button>

  <div class="info-strip">
    <div class="info-row"><span class="dot"></span><span>Uses your iPhone's built-in Neural voices — runs entirely on-device</span></div>
    <div class="info-row"><span class="dot"></span><span>Tap any word in the transcript to jump to that moment</span></div>
    <div class="info-row"><span class="dot"></span><span>Progress is saved — pick up where you left off</span></div>
  </div>
</div>

<!-- ══ PLAYER SCREEN ══ -->
<div class="screen" id="player-screen">
  <div id="player-topbar">
    <button id="back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      New
    </button>
    <div id="player-title"></div>
    <div id="gen-badge">
      <span class="pulse"></span>
      <span>Generating</span>
    </div>
  </div>

  <div id="transcript-scroll">
    <div id="article-source"></div>
    <div id="article-heading"></div>
    <div id="article-meta"></div>
    <div id="transcript"></div>
  </div>
</div>

<!-- ══ FIXED CONTROLS ══ -->
<div id="player-controls">
  <div class="progress-row">
    <span class="time-label" id="t-cur">0:00</span>
    <div id="scrubber-wrap">
      <div id="scrubber-track"></div>
      <div id="scrubber-fill"></div>
      <div id="scrubber-thumb"></div>
    </div>
    <span class="time-label" id="t-dur">—</span>
  </div>
  <div class="controls-row">
    <button id="speed-btn" onclick="cycleSpeed()">1×</button>

    <button class="ctrl" onclick="skip(-15)" aria-label="Skip back 15 seconds">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 17a6 6 0 1 1 0-10"/>
        <polyline points="11,7 8,7 11,4"/>
        <text x="12.5" y="15.5" text-anchor="middle" font-size="6.5" font-family="sans-serif" font-weight="700" fill="currentColor" stroke="none">15</text>
      </svg>
    </button>

    <button id="play-pause-btn" onclick="togglePlay()" aria-label="Play or pause">
      <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>
      <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
        <rect x="5" y="4" width="4" height="16" rx="1.5"/>
        <rect x="15" y="4" width="4" height="16" rx="1.5"/>
      </svg>
      <svg id="icon-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none; animation:spin 0.8s linear infinite">
        <circle cx="12" cy="12" r="9" stroke-dasharray="28 56" stroke-linecap="round"/>
      </svg>
    </button>

    <button class="ctrl" onclick="skip(15)" aria-label="Skip forward 15 seconds">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 17a6 6 0 1 0 0-10"/>
        <polyline points="13,7 16,7 13,4"/>
        <text x="11.5" y="15.5" text-anchor="middle" font-size="6.5" font-family="sans-serif" font-weight="700" fill="currentColor" stroke="none">15</text>
      </svg>
    </button>

    <div style="width:52px"></div><!-- balance -->
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════
//  State
// ═══════════════════════════════════════════════════════
const S = {
  tab: 'url',
  article: null,       // { title, source, text }
  words: [],           // [{text, start, end}] — audio time bounds
  rawText: '',
  utterances: [],      // SpeechSynthesisUtterance[]
  currentUttIdx: 0,
  currentWordIdx: 0,
  isPlaying: false,
  isPaused: false,
  // timing (estimated, updated as utterances complete)
  estDuration: 0,
  elapsedAtPause: 0,
  pausedAt: 0,
  startedAt: 0,
  // speed
  speeds: [0.7, 0.8, 1, 1.1, 1.25, 1.5, 1.75, 2],
  speedIdx: 2,
  // voice
  voice: null,
  rafId: null,
};

// ═══════════════════════════════════════════════════════
//  Boot
// ═══════════════════════════════════════════════════════
window.addEventListener('load', () => {
  loadVoice();
  speechSynthesis.onvoiceschanged = loadVoice;
  setupScrubber();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
});

function loadVoice() {
  const all = speechSynthesis.getVoices();
  if (!all.length) return;
  S.voice =
    all.find(v => v.lang === 'en-US' && v.localService && /ava|samantha|nicky/i.test(v.name)) ||
    all.find(v => v.lang === 'en-US' && v.localService) ||
    all.find(v => v.lang.startsWith('en') && v.localService) ||
    all[0];
}

// ═══════════════════════════════════════════════════════
//  Tab
// ═══════════════════════════════════════════════════════
function switchTab(t) {
  S.tab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + t + '-btn').classList.add('active');
  document.getElementById('tab-' + t).classList.add('active');
}

// ═══════════════════════════════════════════════════════
//  Article extraction
// ═══════════════════════════════════════════════════════
async function fetchArticle(url) {
  const proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
  const res = await fetch(proxy, { signal: AbortSignal.timeout(20000) });
  if (!res.ok) throw new Error('Could not fetch the page.');
  const { contents } = await res.json();

  const doc = new DOMParser().parseFromString(contents, 'text/html');

  // Strip noise
  for (const sel of ['script','style','nav','header','footer','aside','form',
                      'iframe','noscript','[role=banner]','[role=navigation]']) {
    doc.querySelectorAll(sel).forEach(el => el.remove());
  }

  // Title
  const title =
    doc.querySelector('h1')?.textContent?.trim() ||
    doc.querySelector('title')?.textContent?.trim() ||
    new URL(url).hostname;

  const source = new URL(url).hostname.replace(/^www\./, '');

  // Body
  let paragraphs = [];
  for (const sel of ['article','main','[class*=article]','[class*=post-body]',
                      '[class*=story]','[class*=content]','body']) {
    const el = doc.querySelector(sel);
    if (!el) continue;
    const ps = [...el.querySelectorAll('p')]
      .map(p => p.textContent.trim())
      .filter(t => t.length > 60);
    if (ps.length >= 2) { paragraphs = ps; break; }
  }
  if (!paragraphs.length) {
    paragraphs = [...doc.querySelectorAll('p')]
      .map(p => p.textContent.trim())
      .filter(t => t.length > 60);
  }
  if (!paragraphs.length) throw new Error('Could not extract readable text. Try pasting instead.');

  return { title, source, text: paragraphs.join('\n\n') };
}

// ═══════════════════════════════════════════════════════
//  Start listening
// ═══════════════════════════════════════════════════════
async function startListening() {
  setError('');
  setBusy(true);

  try {
    let article;
    if (S.tab === 'url') {
      const raw = document.getElementById('url-input').value.trim();
      if (!raw) { setError('Enter a URL first.'); return; }
      const url = raw.startsWith('http') ? raw : 'https://' + raw;
      article = await fetchArticle(url);
    } else {
      const text = document.getElementById('paste-input').value.trim();
      if (!text) { setError('Paste some text first.'); return; }
      const firstLine = text.split('\n').find(l => l.trim()) || 'Article';
      article = { title: firstLine.slice(0, 80), source: 'Pasted', text };
    }

    S.article = article;
    S.rawText = article.text;
    beginNarration(article);

  } catch (e) {
    setError(e.message || 'Something went wrong.');
  } finally {
    setBusy(false);
  }
}

// ═══════════════════════════════════════════════════════
//  Narration setup
// ═══════════════════════════════════════════════════════
function beginNarration(article) {
  // Tokenise
  S.words = tokenise(article.text);
  S.estDuration = (S.words.length / (150 * S.speeds[S.speedIdx])) * 60;

  // Render
  renderHeader(article);
  renderTranscript(S.words, article.text);
  showScreen('player-screen');
  document.getElementById('player-controls').classList.add('visible');
  document.getElementById('t-dur').textContent = fmt(S.estDuration);

  // Check for saved progress
  const saved = loadProgress(article.title);

  // Build utterances from sentence chunks
  buildUtterances(article.text);

  // Start playback
  const startWord = saved?.wordIdx ?? 0;
  playFromWord(startWord);

  // MediaSession
  setupMediaSession(article.title, article.source);
}

// ═══════════════════════════════════════════════════════
//  Tokeniser
// ═══════════════════════════════════════════════════════
function tokenise(text) {
  const words = [];
  let i = 0;
  const chars = [...text];  // handle unicode correctly

  while (i < chars.length) {
    while (i < chars.length && /\s/.test(chars[i])) i++;
    if (i >= chars.length) break;
    const start = i;
    while (i < chars.length && !/\s/.test(chars[i])) i++;
    words.push({ text: chars.slice(start, i).join(''), charStart: start, charEnd: i });
  }
  return words;
}

// ═══════════════════════════════════════════════════════
//  Utterance construction
// ═══════════════════════════════════════════════════════
function buildUtterances(text) {
  S.utterances = [];
  // Split into sentence-level chunks preserving char offsets
  const sentenceRx = /[^.!?\n]+[.!?\n]*/g;
  let match;
  while ((match = sentenceRx.exec(text)) !== null) {
    const sentText = match[0].trim();
    if (sentText.length < 3) continue;
    const charOffset = match.index;

    const utt = new SpeechSynthesisUtterance(sentText);
    if (S.voice) utt.voice = S.voice;
    utt.rate = S.speeds[S.speedIdx];
    utt.volume = 1;
    utt._charOffset = charOffset;   // where this sentence starts in full text
    utt._sentText = sentText;

    S.utterances.push(utt);
  }
}

// ═══════════════════════════════════════════════════════
//  Playback — the core loop
// ═══════════════════════════════════════════════════════
function playFromWord(startWordIdx) {
  speechSynthesis.cancel();
  S.isPlaying = false;
  S.isPaused = false;
  S.currentWordIdx = startWordIdx;

  // Find which utterance contains the start word
  const startCharIdx = S.words[startWordIdx]?.charStart ?? 0;
  let startUttIdx = 0;
  for (let i = 0; i < S.utterances.length; i++) {
    const utt = S.utterances[i];
    const uttEnd = utt._charOffset + utt._sentText.length;
    if (utt._charOffset <= startCharIdx && startCharIdx < uttEnd) {
      startUttIdx = i;
      break;
    }
    if (utt._charOffset > startCharIdx) { startUttIdx = Math.max(0, i - 1); break; }
    startUttIdx = i;
  }

  S.currentUttIdx = startUttIdx;
  S.startedAt = performance.now();
  S.elapsedAtPause = (S.words[startWordIdx]?.charStart ?? 0) / S.rawText.length * S.estDuration;

  queueUtterances(startUttIdx);
}

function queueUtterances(fromIdx) {
  for (let i = fromIdx; i < S.utterances.length; i++) {
    const utt = S.utterances[i];
    const uttIdx = i;

    // ── boundary event — this is the key to accurate word highlighting ──
    utt.onboundary = (e) => {
      if (e.name !== 'word') return;
      const charInSent   = e.charIndex;
      const charInFull   = utt._charOffset + charInSent;
      const charLen      = e.charLength ?? 1;

      // Find the word whose charStart is closest to charInFull
      let best = S.currentWordIdx;
      for (let wi = Math.max(0, S.currentWordIdx - 2);
               wi < Math.min(S.words.length, S.currentWordIdx + 30);
               wi++) {
        const w = S.words[wi];
        if (w.charStart >= charInFull && w.charStart < charInFull + charLen + 5) {
          best = wi;
          break;
        }
        if (w.charStart <= charInFull) best = wi;
      }
      setActiveWord(best);
    };

    utt.onstart = () => {
      S.currentUttIdx = uttIdx;
      S.isPlaying = true;
      S.isPaused = false;
      setPlayState(true);
      document.getElementById('gen-badge').classList.remove('visible');
      if (!S.rafId) tickProgress();
    };

    utt.onend = () => {
      if (S.isPaused) return;
      if (uttIdx === S.utterances.length - 1) {
        onFinished();
      }
    };

    utt.onerror = (e) => {
      if (e.error === 'interrupted' || e.error === 'canceled') return;
    };

    speechSynthesis.speak(utt);
  }
}

function onFinished() {
  S.isPlaying = false;
  setPlayState(false);
  cancelAnimationFrame(S.rafId); S.rafId = null;
  // Mark all words past
  document.querySelectorAll('.w').forEach(el => {
    el.classList.remove('now', 'coming');
    el.classList.add('past');
  });
  clearProgress(S.article?.title);
  toast('Finished');
}

// ═══════════════════════════════════════════════════════
//  Controls
// ═══════════════════════════════════════════════════════
function togglePlay() {
  if (!S.words.length) return;

  if (S.isPlaying && !S.isPaused) {
    speechSynthesis.pause();
    S.isPaused = true;
    S.isPlaying = false;
    S.elapsedAtPause += (performance.now() - S.startedAt) / 1000;
    setPlayState(false);
    cancelAnimationFrame(S.rafId); S.rafId = null;
    saveProgress();

  } else if (S.isPaused) {
    speechSynthesis.resume();
    S.isPaused = false;
    S.isPlaying = true;
    S.startedAt = performance.now();
    setPlayState(true);
    tickProgress();

  } else {
    // Stopped — restart from beginning
    playFromWord(0);
  }
}

function skip(sec) {
  if (!S.words.length) return;
  const elapsed = currentElapsed();
  const newElapsed = Math.max(0, Math.min(S.estDuration, elapsed + sec));
  const frac = newElapsed / S.estDuration;
  const wordIdx = Math.floor(frac * S.words.length);
  jumpToWord(wordIdx);
}

function jumpToWord(wordIdx) {
  wordIdx = Math.max(0, Math.min(wordIdx, S.words.length - 1));
  speechSynthesis.cancel();
  cancelAnimationFrame(S.rafId); S.rafId = null;
  S.isPlaying = false;
  S.isPaused = false;
  setPlayState(false);
  playFromWord(wordIdx);
}

function cycleSpeed() {
  S.speedIdx = (S.speedIdx + 1) % S.speeds.length;
  const s = S.speeds[S.speedIdx];
  document.getElementById('speed-btn').textContent = s + '×';
  S.estDuration = (S.words.length / (150 * s)) * 60;

  if (S.isPlaying || S.isPaused) {
    const w = S.currentWordIdx;
    // Rebuild utterances at new rate
    S.utterances.forEach(u => u.rate = s);
    jumpToWord(w);
  }
}

// ═══════════════════════════════════════════════════════
//  Word highlight
// ═══════════════════════════════════════════════════════
let lastHighlight = -1;

function setActiveWord(idx) {
  if (idx === lastHighlight || idx < 0 || idx >= S.words.length) return;

  // Large jump — do full sweep
  if (Math.abs(idx - lastHighlight) > 30) {
    document.querySelectorAll('.w').forEach((el, i) => {
      el.className = 'w ' + (i < idx ? 'past' : i === idx ? 'now' : 'coming');
    });
  } else {
    if (lastHighlight >= 0) {
      const old = document.getElementById('w' + lastHighlight);
      if (old) { old.classList.remove('now'); old.classList.add('past'); }
    }
    for (let i = Math.max(0, lastHighlight + 1); i < idx; i++) {
      const el = document.getElementById('w' + i);
      if (el) { el.classList.remove('now', 'coming'); el.classList.add('past'); }
    }
    const el = document.getElementById('w' + idx);
    if (el) { el.classList.remove('past', 'coming'); el.classList.add('now'); }
  }

  lastHighlight = idx;
  S.currentWordIdx = idx;

  // Scroll into view
  const el = document.getElementById('w' + idx);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ═══════════════════════════════════════════════════════
//  Progress bar (time-estimated, updates every frame)
// ═══════════════════════════════════════════════════════
function currentElapsed() {
  if (S.isPaused || !S.isPlaying) return S.elapsedAtPause;
  return S.elapsedAtPause + (performance.now() - S.startedAt) / 1000;
}

function tickProgress() {
  const elapsed = currentElapsed();
  const dur = S.estDuration || 1;
  const pct = Math.min(1, elapsed / dur) * 100;

  document.getElementById('scrubber-fill').style.width  = pct + '%';
  document.getElementById('scrubber-thumb').style.left  = pct + '%';
  document.getElementById('t-cur').textContent = fmt(elapsed);

  saveProgress();   // auto-save position ~60fps (localStorage is fast enough)

  if (S.isPlaying && !S.isPaused) {
    S.rafId = requestAnimationFrame(tickProgress);
  }
}

// ═══════════════════════════════════════════════════════
//  Scrubber interaction
// ═══════════════════════════════════════════════════════
function setupScrubber() {
  const wrap = document.getElementById('scrubber-wrap');

  function onScrub(clientX) {
    const rect = wrap.getBoundingClientRect();
    const frac = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const wordIdx = Math.floor(frac * S.words.length);
    jumpToWord(wordIdx);
  }

  wrap.addEventListener('click', e => onScrub(e.clientX));
  wrap.addEventListener('touchstart', e => {
    onScrub(e.touches[0].clientX);
    e.preventDefault();
  }, { passive: false });
}

// ═══════════════════════════════════════════════════════
//  Rendering
// ═══════════════════════════════════════════════════════
function renderHeader(article) {
  document.getElementById('article-source').textContent  = article.source.toUpperCase();
  document.getElementById('article-heading').textContent = article.title;
  document.getElementById('player-title').textContent    = article.title;
  const wc = S.words.length;
  const mins = Math.max(1, Math.round(wc / 200));
  document.getElementById('article-meta').textContent =
    wc.toLocaleString() + ' words · ~' + mins + ' min listen';
}

function renderTranscript(words, text) {
  const container = document.getElementById('transcript');
  container.innerHTML = '';

  let html = '';
  let lastEnd = 0;

  for (const w of words) {
    const between = text.slice(lastEnd, w.charStart);
    if (between.includes('\n\n')) html += '<span class="para-gap"></span>';
    html += `<span class="w coming" id="w${w.id ?? words.indexOf(w)}"
      data-i="${w.id ?? words.indexOf(w)}"
      onclick="jumpToWord(${w.id ?? words.indexOf(w)})">${esc(w.text)}</span> `;
    lastEnd = w.charEnd;
  }

  container.innerHTML = html;
  lastHighlight = -1;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════════════════
//  Tokenise — add id and clean index-based id
// ═══════════════════════════════════════════════════════
// Override tokenise to add numeric IDs
(function patchTokenise() {
  const orig = tokenise;
  window.tokenise = function(text) {
    const words = orig(text);
    words.forEach((w, i) => { w.id = i; });
    return words;
  };
})();

// ═══════════════════════════════════════════════════════
//  Persistence (localStorage)
// ═══════════════════════════════════════════════════════
function saveKey(title) { return 'legible:' + title.slice(0, 60); }

function saveProgress() {
  if (!S.article) return;
  try {
    localStorage.setItem(saveKey(S.article.title), JSON.stringify({
      wordIdx: S.currentWordIdx,
      elapsed: currentElapsed(),
      ts: Date.now(),
    }));
  } catch {}
}

function loadProgress(title) {
  try {
    const raw = localStorage.getItem(saveKey(title));
    if (!raw) return null;
    const data = JSON.parse(raw);
    // Discard saves older than 30 days
    if (Date.now() - data.ts > 30 * 86400 * 1000) return null;
    return data;
  } catch { return null; }
}

function clearProgress(title) {
  if (!title) return;
  try { localStorage.removeItem(saveKey(title)); } catch {}
}

// ═══════════════════════════════════════════════════════
//  MediaSession (lock screen controls)
// ═══════════════════════════════════════════════════════
function setupMediaSession(title, artist) {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({ title, artist });
  navigator.mediaSession.setActionHandler('play',         () => togglePlay());
  navigator.mediaSession.setActionHandler('pause',        () => togglePlay());
  navigator.mediaSession.setActionHandler('seekbackward', () => skip(-15));
  navigator.mediaSession.setActionHandler('seekforward',  () => skip(15));
  navigator.mediaSession.setActionHandler('previoustrack',() => skip(-30));
  navigator.mediaSession.setActionHandler('nexttrack',    () => skip(30));
}

function updateMediaSessionState() {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.playbackState = S.isPlaying ? 'playing' : 'paused';
}

// ═══════════════════════════════════════════════════════
//  UI helpers
// ═══════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goBack() {
  speechSynthesis.cancel();
  cancelAnimationFrame(S.rafId); S.rafId = null;
  S.isPlaying = false; S.isPaused = false;
  document.getElementById('player-controls').classList.remove('visible');
  showScreen('input-screen');
}

function setPlayState(playing) {
  document.getElementById('icon-play').style.display  = playing ? 'none' : 'block';
  document.getElementById('icon-pause').style.display = playing ? 'block' : 'none';
  document.getElementById('icon-spin').style.display  = 'none';
  updateMediaSessionState();
}

function setBusy(busy) {
  const btn = document.getElementById('listen-btn');
  const icon = document.getElementById('btn-icon');
  const label = document.getElementById('btn-label');
  btn.disabled = busy;
  if (busy) {
    icon.outerHTML = '<span class="spinner" id="btn-icon"></span>';
    label.textContent = 'Loading…';
  } else {
    document.getElementById('btn-icon').outerHTML =
      `<svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18" id="btn-icon"><polygon points="6,4 16,10 6,16"/></svg>`;
    label.textContent = 'Listen';
  }
}

function setError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.className = 'error-box' + (msg ? ' visible' : '');
}

let toastT;
function toast(msg, ms = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), ms);
}

function fmt(s) {
  s = Math.max(0, Math.floor(s || 0));
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

// Prevent double-tap zoom on controls
document.addEventListener('dblclick', e => {
  if (e.target.closest('#player-controls, #player-topbar')) e.preventDefault();
}, { passive: false });
</script>
